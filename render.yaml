# REVIEW: `healthCheckPath: /health` does not match any route in `api_users/server.js` — add a health endpoint or change this path.
services:
  - type: web
    name: react-javascript-api-backend
    runtime: node
    rootDir: api_users
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        value: https://patriciagea.github.io,http://localhost:5173
